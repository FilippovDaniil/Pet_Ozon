# Helm-шаблон приложения: ConfigMap + Deployment + Service.
# Аналог статичного infra/rancher/k8s/06-app.yaml, но значения берутся из values.yaml
# через {{ .Values.* }} — один чарт, разные среды (helm install --set ...).
# Подробные пояснения к каждой настройке — в k8s/06-app.yaml.

# ── РЕСУРС 1: ConfigMap — несекретные env-переменные приложения ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: marketplace-config
  namespace: {{ .Values.namespace }}
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-service:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
  SPRING_DATASOURCE_USERNAME: {{ .Values.postgres.user | quote }}
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  SPRING_MAIL_HOST: {{ .Values.mail.host | quote }}
  SPRING_MAIL_PORT: {{ .Values.mail.port | quote }}
  SPRING_MAIL_USERNAME: {{ .Values.mail.username | quote }}
  SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE: "true"
  MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"

---
# ── РЕСУРС 2: Deployment — поды приложения ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketplace-app
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: marketplace-app
  template:
    metadata:
      labels:
        app: marketplace-app
    spec:
      # initContainer: ждём готовности PostgreSQL, чтобы Spring Boot не упал на старте.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service {{ .Values.postgres.port }}; do
                echo "Waiting for postgres-service:{{ .Values.postgres.port }}..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
      containers:
        - name: marketplace-app
          image: "{{ .Values.app.image }}:{{ .Values.app.tag }}"
          imagePullPolicy: {{ .Values.app.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.app.port }}
          # Несекретные настройки — из ConfigMap целиком.
          envFrom:
            - configMapRef:
                name: marketplace-config
          # Секреты — отдельно, из Secret по конкретным ключам.
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: marketplace-secrets
                  key: postgres-password
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: marketplace-secrets
                  key: mail-password
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.app.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.app.port }}
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3

---
# ── РЕСУРС 3: Service — доступ к приложению снаружи кластера (NodePort) ──
apiVersion: v1
kind: Service
metadata:
  name: marketplace-service
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  selector:
    app: marketplace-app
  ports:
    - port: {{ .Values.app.port }}
      targetPort: {{ .Values.app.port }}
      nodePort: {{ .Values.app.nodePort }}
