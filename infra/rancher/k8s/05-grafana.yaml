---
# ── РЕСУРС 4: PersistentVolumeClaim ─────────────────────────────────────────
# Grafana хранит в /var/lib/grafana: базу SQLite (пользователи, настройки, API-ключи).
# Без PVC при рестарте теряются: добавленные вручную datasources, изменения дашбордов,
# API-ключи, плагины. Provisioning-конфиг (из ConfigMap) пересоздаётся автоматически,
# но остальное — нет.

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: marketplace
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi    # Grafana SQLite + плагины ~ 50-100 МБ. 256 МБ с запасом.

---
# ── РЕСУРС 5: Deployment ─────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: marketplace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.3

          ports:
            - containerPort: 3000   # HTTP UI Grafana. Доступен через NodePort 30300.

          env:                                  # Настройки через переменные окружения.
                                                # Grafana поддерживает конфигурацию через GF_*
            - name: GF_SECURITY_ADMIN_PASSWORD  # Пароль admin-пользователя.
              value: "admin"                    # Для учебного проекта. В prod — из Secret!
            - name: GF_USERS_ALLOW_SIGN_UP      # Запретить самостоятельную регистрацию.
              value: "false"                    # Только admin может создавать пользователей.

          volumeMounts:
            # ТОМ 1: Постоянное хранилище Grafana (SQLite + плагины).
            - name: grafana-storage
              mountPath: /var/lib/grafana       # Стандартный путь данных Grafana.

            # ТОМ 2: Datasources (loki.yml + prometheus.yml).
            # Grafana читает файлы из этой директории при старте → создаёт подключения.
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources

            # ТОМ 3: Провайдер дашбордов (dashboards.yml).
            # Этот файл говорит "ищи JSON дашборды в /dashboards/json".
            - name: grafana-dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards

            # ТОМ 4: Сами JSON-дашборды (marketplace.json + metrics.json).
            # Монтируем в ПОДПАПКУ /json — не перетираем dashboards.yml из тома 3.
            # Это ключевой момент: два ConfigMap монтируются в одно дерево директорий.
            - name: grafana-dashboards
              mountPath: /etc/grafana/provisioning/dashboards/json

          readinessProbe:
            httpGet:
              path: /api/health   # Grafana /api/health → {"database":"ok"} когда готова.
              port: 3000
            initialDelaySeconds: 15   # Grafana инициализирует SQLite, плагины ~10-15 сек.
            periodSeconds: 5

      volumes:
        - name: grafana-storage           # ← PVC для /var/lib/grafana
          persistentVolumeClaim:
            claimName: grafana-pvc

        - name: grafana-datasources       # ← ConfigMap grafana-datasources → файлы в /datasources/
          configMap:
            name: grafana-datasources

        - name: grafana-dashboards-config # ← ConfigMap с dashboards.yml → файл в /dashboards/
          configMap:
            name: grafana-dashboards-config

        - name: grafana-dashboards        # ← ConfigMap с JSON → файлы в /dashboards/json/
          configMap:
            name: grafana-dashboards

---
# ── РЕСУРС 6: Service ────────────────────────────────────────────────────────
#
# ⚠️  Сервис называется "grafana" — для совместимости с docker-compose.
# NodePort 30300 — Grafana открыта снаружи: http://localhost:30300
# Логин по умолчанию: admin / admin
# После входа смотри: Dashboards → Browse → папка "marketplace".

apiVersion: v1
kind: Service
metadata:
  name: grafana         # DNS внутри кластера: http://grafana:3000
  namespace: marketplace
spec:
  type: NodePort        # Открываем наружу — удобный доступ к UI без port-forward.
  selector:
    app: grafana
  ports:
    - port: 3000        # Порт для обращений из кластера.
      targetPort: 3000  # Порт контейнера.
      nodePort: 30300   # Порт на хосте. http://localhost:30300 → UI Grafana.
