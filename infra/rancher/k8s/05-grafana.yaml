# ════════════════════════════════════════════════════════════════════════════
# 05-grafana.yaml — Grafana: визуализация логов и метрик
# Содержит шесть ресурсов: 3×ConfigMap + PVC + Deployment + Service
# ════════════════════════════════════════════════════════════════════════════
#
# ЧТО ТАКОЕ PROVISIONING В GRAFANA?
# Provisioning = автоматическая настройка при старте. Grafana читает YAML-файлы
# из /etc/grafana/provisioning/ и создаёт datasources и дашборды без ручной настройки.
# Это "Infrastructure as Code" для Grafana: конфиг лежит в git, не в БД Grafana.
#
# БЕЗ PROVISIONING: нужно вручную через UI добавлять datasources и импортировать дашборды.
# С PROVISIONING: при каждом перезапуске Grafana всё создаётся автоматически.
#
# СТРУКТУРА КОНФИГУРАЦИОННЫХ ФАЙЛОВ:
# /etc/grafana/provisioning/
# ├── datasources/        ← откуда брать данные (Loki, Prometheus)
# │   ├── loki.yml
# │   └── prometheus.yml
# └── dashboards/         ← как находить JSON-дашборды
#     ├── dashboards.yml  ← провайдер: путь к файлам
#     └── json/           ← сами JSON-дашборды (монтируем из отдельного ConfigMap)
#         ├── marketplace.json
#         └── metrics.json
#
# МЫ СОЗДАЁМ 3 ConfigMap:
# 1. grafana-datasources     → файлы loki.yml и prometheus.yml
# 2. grafana-dashboards-config → файл dashboards.yml (описывает где искать JSON)
# 3. grafana-dashboards      → JSON-файлы двух дашбордов
# ════════════════════════════════════════════════════════════════════════════

# ── РЕСУРС 1: ConfigMap — источники данных (datasources) ─────────────────────
#
# Grafana читает файлы из /etc/grafana/provisioning/datasources/*.yml
# и автоматически создаёт подключения к Loki и Prometheus.
# URL-адреса используют K8s DNS: "loki" и "prometheus" = имена K8s сервисов.

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources   # Монтируется в /etc/grafana/provisioning/datasources/
  namespace: marketplace
data:
  loki.yml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki-ds
        access: proxy
        url: http://loki:3100
        isDefault: true
        jsonData:
          maxLines: 1000
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus-ds
        access: proxy
        url: http://prometheus:9090
        isDefault: false
        jsonData:
          timeInterval: 15s

---
# ── РЕСУРС 2: ConfigMap — провайдер дашбордов ────────────────────────────────
#
# Этот файл сообщает Grafana: "ищи JSON дашборды по пути /etc/grafana/provisioning/dashboards/json".
# Grafana автоматически загрузит все .json файлы из этой директории.
# Именно в эту директорию мы монтируем третий ConfigMap (grafana-dashboards).

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config   # Монтируется в /etc/grafana/provisioning/dashboards/
  namespace: marketplace
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: marketplace
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards/json
          foldersFromFilesStructure: false

---
# ── РЕСУРС 3: ConfigMap — JSON-файлы дашбордов ───────────────────────────────
#
# Два готовых дашборда встроены прямо в ConfigMap как текстовые ключи.
# При монтировании каждый ключ становится файлом:
#   marketplace.json → /etc/grafana/provisioning/dashboards/json/marketplace.json
#   metrics.json     → /etc/grafana/provisioning/dashboards/json/metrics.json
#
# Grafana подгружает их автоматически при старте (через провайдер из ConfigMap выше).
# Дашборды провизионированы = их нельзя удалить через UI (только через изменение ConfigMap).
# Используй allowUiUpdates: true (в dashboards.yml) чтобы редактировать через UI.
#
# ПОЧЕМУ НЕ ХРАНИТЬ JSON В GIT КАК ОБЫЧНЫЙ ФАЙЛ И НЕ МОНТИРОВАТЬ?
# В K8s нет прямого доступа к файловой системе хоста — всё через ConfigMap/Secret/PVC.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: marketplace
data:
  marketplace.json: |
    {
      "__inputs": [],
      "__elements": {},
      "__requires": [],
      "annotations": { "list": [] },
      "description": "Аудит-лог маркетплейса: действия CLIENT, SELLER и ADMIN",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 10,
          "title": "Обзор трафика",
          "type": "row"
        },
        {
          "datasource": { "type": "loki", "uid": "loki-ds" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "lineWidth": 2 }
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "legend": { "calcs": [], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki-ds" },
              "expr": "sum by(role) (rate({app=\"marketplace\"}[1m]))",
              "legendFormat": "{{role}}",
              "refId": "A"
            }
          ],
          "title": "Количество логов в минуту (по роли)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 11,
          "title": "Действия акторов",
          "type": "row"
        },
        {
          "datasource": { "type": "loki", "uid": "loki-ds" },
          "gridPos": { "h": 9, "w": 8, "x": 0, "y": 10 },
          "id": 2,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki-ds" },
              "expr": "{app=\"marketplace\", role=\"CLIENT\"} |= \"ACTION=\"",
              "refId": "A"
            }
          ],
          "title": "CLIENT: действия покупателя",
          "type": "logs"
        },
        {
          "datasource": { "type": "loki", "uid": "loki-ds" },
          "gridPos": { "h": 9, "w": 8, "x": 8, "y": 10 },
          "id": 3,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki-ds" },
              "expr": "{app=\"marketplace\", role=\"SELLER\"} |= \"ACTION=\"",
              "refId": "A"
            }
          ],
          "title": "SELLER: действия продавца",
