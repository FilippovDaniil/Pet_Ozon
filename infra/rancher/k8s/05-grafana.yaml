        },
        {
          "datasource": { "type": "loki", "uid": "loki-ds" },
          "gridPos": { "h": 9, "w": 8, "x": 16, "y": 10 },
          "id": 4,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki-ds" },
              "expr": "{app=\"marketplace\", role=\"ADMIN\"} |= \"ACTION=\"",
              "refId": "A"
            }
          ],
          "title": "ADMIN: административные действия",
          "type": "logs"
