# ════════════════════════════════════════════════════════════════════════════
# 09-opensearch-dashboards.yaml — OpenSearch Dashboards (веб-UI для OpenSearch)
#
# Аналог Kibana, но для OpenSearch. Позволяет:
#   • Просматривать и искать по индексам (Dev Tools → GET /products/_search)
#   • Строить дашборды и визуализации
#   • Смотреть маппинги, алиасы, health кластера
#
# Подключается к opensearch-service:9200 внутри кластера.
# DISABLE_SECURITY_DASHBOARDS_PLUGIN=true — соответствует DISABLE_SECURITY_PLUGIN в OpenSearch.
#
# Доступ: http://localhost:30601
# ════════════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-dashboards
  namespace: marketplace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch-dashboards
  template:
    metadata:
      labels:
        app: opensearch-dashboards
    spec:
      containers:
        - name: opensearch-dashboards
          image: opensearchproject/opensearch-dashboards:2.17.0
          imagePullPolicy: IfNotPresent
          env:
            # URL кластера OpenSearch внутри K8s (DNS-имя Service из 08-opensearch.yaml)
            - name: OPENSEARCH_HOSTS
              value: '["http://opensearch-service:9200"]'
            # Отключаем Security plugin — OpenSearch у нас тоже без TLS/Auth
            - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
              value: "true"
            # Разрешаем подключение с любого хоста (нужно для NodePort-доступа)
            - name: SERVER_HOST
              value: "0.0.0.0"
          ports:
            - containerPort: 5601
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12   # Dashboards стартует ~60 сек
          livenessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-dashboards-service
  namespace: marketplace
spec:
  type: NodePort
  selector:
    app: opensearch-dashboards
  ports:
    - port: 5601
      targetPort: 5601
      nodePort: 30601   # http://localhost:30601
