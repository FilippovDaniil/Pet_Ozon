# Автоматическое подключение Loki как источника данных в Grafana.
# При старте Grafana читает этот файл и создаёт datasource без ручной настройки.
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki-ds
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 1000
