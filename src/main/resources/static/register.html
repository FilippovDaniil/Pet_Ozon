<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace — Регистрация</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/auth.js"></script>
    <script>
        (function () {
            const u = getCurrentUser();
            if (u) window.location.href = roleHome(u.role);
        })();
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-600 via-indigo-700 to-purple-800 flex items-center justify-center p-4">

    <div x-data="registerApp()" class="w-full max-w-md">

        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">

            <!-- Шапка -->
            <div class="bg-gradient-to-r from-indigo-500 to-purple-600 px-8 pt-10 pb-8 text-white text-center">
                <div class="text-5xl mb-3">🛍️</div>
                <h1 class="text-2xl font-bold tracking-tight">Регистрация</h1>
                <p class="text-indigo-100 text-sm mt-1">Создайте аккаунт покупателя</p>
            </div>

            <!-- Форма -->
            <div class="px-8 py-8">
                <form @submit.prevent="doRegister" class="space-y-5">

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Имя</label>
                        <input
                            x-model="fullName"
                            type="text"
                            autocomplete="name"
                            placeholder="Иван Иванов"
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                                   transition placeholder-gray-400"
                        >
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
                        <input
                            x-model="email"
                            type="email"
                            autocomplete="email"
                            placeholder="ivan@example.com"
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                                   transition placeholder-gray-400"
                            required
                        >
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Пароль</label>
                        <input
                            x-model="password"
                            type="password"
                            autocomplete="new-password"
                            placeholder="Минимум 6 символов"
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                                   transition placeholder-gray-400"
                            required
                            minlength="6"
                        >
                    </div>

                    <!-- Ошибка -->
                    <div
                        x-show="error"
                        x-transition
                        class="flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm"
                    >
                        <span>⚠️</span>
                        <span x-text="error"></span>
                    </div>

                    <!-- Успех -->
                    <div
                        x-show="success"
                        x-transition
                        class="flex items-center gap-2 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg text-sm"
                    >
                        <span>✅</span>
                        <span>Аккаунт создан! Перенаправляем...</span>
                    </div>

                    <button
                        type="submit"
                        :disabled="loading || success"
                        class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800
                               disabled:opacity-60 text-white font-semibold rounded-lg transition
                               flex items-center justify-center gap-2"
                    >
                        <svg x-show="loading" class="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                        </svg>
                        <span x-text="loading ? 'Регистрация...' : 'Создать аккаунт'"></span>
                    </button>
                </form>

                <p class="text-center text-sm text-gray-500 mt-5">
                    Уже есть аккаунт?
                    <a href="login.html" class="text-indigo-600 hover:text-indigo-700 font-medium">Войти</a>
                </p>
            </div>
        </div>

        <p class="text-center text-indigo-200 text-xs mt-6">Spring Boot 3.4.4 · PostgreSQL · Pet-проект</p>
    </div>

    <script>
        function registerApp() {
            return {
                fullName: '',
                email: '',
                password: '',
                error: '',
                loading: false,
                success: false,

                async doRegister() {
                    this.error = '';
                    this.loading = true;
                    try {
                        await register(this.email, this.password, this.fullName);
                        this.success = true;
                        setTimeout(() => window.location.href = 'client.html', 800);
                    } catch (e) {
                        this.error = e.message || 'Ошибка регистрации';
                    } finally {
                        this.loading = false;
                    }
                },
            };
        }
    </script>
</body>
</html>
