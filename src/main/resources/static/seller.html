<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace — Продавец</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/auth.js"></script>
    <script>
        (function () {
            const u = requireAuth('SELLER');
            if (!u) throw new Error('redirect');
        })();
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <script src="js/api.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div x-data="sellerApp()" class="min-h-screen flex flex-col" x-cloak>

    <!-- ═══════════════════════════ NAVBAR ════════════════════════════════ -->
    <nav class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🏪</span>
                <div>
                    <span class="font-bold text-gray-900 text-lg" x-text="user?.shopName || 'Мой магазин'"></span>
                    <span class="text-xs text-gray-400 ml-2">продавец</span>
                </div>
            </div>

            <div class="flex items-center gap-1">
                <button @click="setTab('products')"
                    :class="activeTab === 'products' ? 'bg-emerald-50 text-emerald-700 font-semibold' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-100'"
                    class="px-4 py-2 rounded-lg text-sm transition">
                    Мои товары
                </button>
                <button @click="setTab('sales')"
                    :class="activeTab === 'sales' ? 'bg-emerald-50 text-emerald-700 font-semibold' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-100'"
                    class="px-4 py-2 rounded-lg text-sm transition">
                    Продажи
                </button>
                <button @click="setTab('balance')"
                    :class="activeTab === 'balance' ? 'bg-emerald-50 text-emerald-700 font-semibold' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-100'"
                    class="px-4 py-2 rounded-lg text-sm transition">
                    Баланс
                </button>
            </div>

            <div class="flex items-center gap-3">
                <span class="text-sm text-gray-600" x-text="user?.name"></span>
                <a href="profile.html"
                   class="text-sm text-gray-500 hover:text-emerald-600 transition px-3 py-1.5 rounded-lg hover:bg-emerald-50">
                    Профиль
                </a>
                <button @click="logout()" class="text-sm text-gray-500 hover:text-red-600 transition px-3 py-1.5 rounded-lg hover:bg-red-50">
                    Выйти
                </button>
            </div>
        </div>
    </nav>

    <!-- ═══════════════════════════ TOAST ═════════════════════════════════ -->
    <div class="fixed top-20 right-4 z-50 space-y-2">
        <template x-for="t in toasts" :key="t.id">
            <div x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-x-4"
                 x-transition:enter-end="opacity-100 translate-x-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100"
                 x-transition:leave-end="opacity-0"
                 :class="t.type === 'error' ? 'bg-red-50 border-red-200 text-red-800' : 'bg-green-50 border-green-200 text-green-800'"
                 class="flex items-center gap-2 px-4 py-3 rounded-xl border shadow-lg text-sm max-w-sm">
                <span x-text="t.type === 'error' ? '⚠️' : '✅'"></span>
                <span x-text="t.message"></span>
            </div>
        </template>
    </div>

    <!-- ══════════════════════════ MAIN ═══════════════════════════════════ -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">

        <!-- ──────────────────── TAB: МОИ ТОВАРЫ ──────────────────────── -->
        <div x-show="activeTab === 'products'">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-gray-900">Мои товары</h2>
                <button @click="openModal()"
                        class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold rounded-lg transition flex items-center gap-2">
                    <span>+</span> Добавить товар
                </button>
            </div>

            <!-- Загрузка -->
            <div x-show="loadingProducts" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                <template x-for="n in [1,2,3,4]" :key="n">
                    <div class="bg-white rounded-xl animate-pulse h-64"></div>
                </template>
            </div>

            <!-- Пусто -->
            <div x-show="!loadingProducts && products.length === 0" class="text-center py-20 text-gray-400">
                <div class="text-5xl mb-3">📦</div>
                <p class="text-lg mb-4">У вас пока нет товаров</p>
                <button @click="openModal()"
                        class="px-6 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition text-sm font-medium">
                    Добавить первый товар
                </button>
            </div>

            <!-- Сетка товаров -->
            <div x-show="!loadingProducts && products.length > 0"
                 class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                <template x-for="p in products" :key="p.id">
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col overflow-hidden">
                        <div class="h-28 flex items-center justify-center text-4xl font-bold text-white"
                             :style="`background: ${productColor(p.id)}`">
                            <span x-text="p.name ? p.name[0].toUpperCase() : '?'"></span>
                        </div>
                        <div class="p-4 flex flex-col flex-1">
                            <h3 class="font-semibold text-gray-900 text-sm leading-tight mb-1" x-text="p.name"></h3>
                            <span x-show="p.category"
                                  class="inline-block text-xs text-gray-500 bg-gray-100 px-2 py-0.5 rounded-full mb-1 self-start"
                                  x-text="p.category"></span>
                            <p class="text-gray-400 text-xs mb-3 line-clamp-2 flex-1" x-text="p.description || '—'"></p>
                            <div class="flex items-center justify-between mb-3">
                                <span class="font-bold text-emerald-600" x-text="fmt(p.price)"></span>
                                <span :class="p.stockQuantity > 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'"
                                      class="text-xs px-2 py-0.5 rounded-full"
                                      x-text="`Остаток: ${p.stockQuantity}`"></span>
                            </div>
                            <div class="flex gap-2">
                                <button @click="openModal(p)"
                                        class="flex-1 py-1.5 border border-gray-300 text-gray-700 rounded-lg text-xs hover:bg-gray-50 transition">
                                    Изменить
                                </button>
                                <button @click="deleteProduct(p)"
                                        class="flex-1 py-1.5 bg-red-50 border border-red-200 text-red-600 rounded-lg text-xs hover:bg-red-100 transition">
                                    Удалить
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- ──────────────────── TAB: ПРОДАЖИ ──────────────────────────── -->
        <div x-show="activeTab === 'sales'">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-gray-900">Продажи</h2>
                <button @click="loadSales()" class="text-sm text-emerald-600 hover:text-emerald-700 font-medium">
                    Обновить
                </button>
            </div>

            <div x-show="loadingSales" class="space-y-3">
                <template x-for="n in [1,2,3]" :key="n">
                    <div class="bg-white rounded-xl p-5 animate-pulse h-20"></div>
                </template>
            </div>

            <div x-show="!loadingSales && sales.length === 0" class="text-center py-20 text-gray-400">
                <div class="text-5xl mb-3">📋</div>
                <p class="text-lg">Продаж пока нет</p>
                <p class="text-sm mt-1">Сюда попадут заказы, содержащие ваши товары</p>
            </div>

            <div x-show="!loadingSales && sales.length > 0" class="space-y-4 max-w-3xl">
                <template x-for="order in sales" :key="order.id">
                    <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                        <div class="p-4 cursor-pointer hover:bg-gray-50 transition"
                             @click="expandedSale = expandedSale === order.id ? null : order.id">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <span class="text-sm font-bold text-gray-900">Заказ #<span x-text="order.id"></span></span>
                                    <span :class="statusBadge(order.status)"
                                          class="text-xs px-2.5 py-0.5 rounded-full font-medium"
                                          x-text="statusLabel(order.status)"></span>
                                </div>
                                <div class="flex items-center gap-4">
                                    <span class="text-sm font-semibold text-gray-900" x-text="fmt(order.totalAmount)"></span>
                                    <span class="text-gray-400 text-xs" x-text="expandedSale === order.id ? '▲' : '▼'"></span>
                                </div>
                            </div>
                            <div class="mt-1 text-xs text-gray-400" x-text="fmtDate(order.orderDate)"></div>
                        </div>

                        <div x-show="expandedSale === order.id" x-transition class="border-t border-gray-100 p-4 space-y-2">
                            <template x-for="item in order.items" :key="item.id">
                                <div class="flex justify-between text-sm">
                                    <span class="text-gray-700" x-text="item.productName"></span>
                                    <span class="text-gray-500">
                                        <span x-text="item.quantity"></span> × <span x-text="fmt(item.priceAtOrder)"></span>
                                    </span>
                                </div>
                            </template>
                            <div class="text-xs text-gray-400 pt-1">
                                📍 <span x-text="order.shippingAddress || 'Адрес не указан'"></span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- ──────────────────── TAB: БАЛАНС ───────────────────────────── -->
        <div x-show="activeTab === 'balance'">
            <h2 class="text-xl font-bold text-gray-900 mb-6">Мой баланс</h2>

            <div x-show="loadingBalance" class="max-w-md">
                <div class="bg-white rounded-2xl animate-pulse h-40"></div>
            </div>

            <div x-show="!loadingBalance && sellerInfo" class="max-w-md space-y-4">
                <!-- Карточка баланса -->
                <div class="bg-gradient-to-br from-emerald-500 to-teal-600 rounded-2xl p-6 text-white shadow-lg">
                    <p class="text-emerald-100 text-sm font-medium mb-1">Текущий баланс</p>
                    <p class="text-4xl font-extrabold mb-4" x-text="fmt(sellerInfo?.balance || 0)"></p>
                    <div class="flex items-center gap-2">
                        <span class="text-xl">🏪</span>
                        <div>
                            <p class="font-semibold" x-text="sellerInfo?.shopName"></p>
                            <p class="text-emerald-100 text-xs" x-text="sellerInfo?.email"></p>
                        </div>
                    </div>
                </div>

                <!-- Инфо -->
                <div class="bg-white rounded-xl border border-gray-100 p-5 space-y-3 shadow-sm">
                    <p class="text-sm font-semibold text-gray-700">Информация о продавце</p>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between">
                            <span class="text-gray-500">Имя</span>
                            <span class="font-medium text-gray-900" x-text="sellerInfo?.fullName"></span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">Магазин</span>
                            <span class="font-medium text-gray-900" x-text="sellerInfo?.shopName"></span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">Email</span>
                            <span class="font-medium text-gray-900" x-text="sellerInfo?.email"></span>
                        </div>
                    </div>
                </div>

                <div class="bg-blue-50 rounded-xl border border-blue-100 p-4 text-xs text-blue-700">
                    💡 Баланс пополняется автоматически при оплате покупателем заказов с вашими товарами.
                </div>
            </div>
        </div>
    </main>

    <!-- ══════════════════════ МОДАЛ ТОВАРА ══════════════════════════════ -->
    <div x-show="showModal"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
         @click.self="showModal = false">

        <div x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100"
             class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6">

            <h3 class="text-lg font-bold text-gray-900 mb-5"
                x-text="editingProduct ? 'Редактировать товар' : 'Новый товар'"></h3>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Название *</label>
                    <input x-model="form.name" placeholder="Ноутбук Dell XPS 15"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Описание</label>
                    <textarea x-model="form.description" rows="2" placeholder="Краткое описание товара"
                              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 resize-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Цена (₽) *</label>
                        <input x-model="form.price" type="number" min="0" step="0.01" placeholder="9999.99"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Остаток *</label>
                        <input x-model="form.stockQuantity" type="number" min="0" placeholder="10"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Категория</label>
                    <select x-model="form.category"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white">
                        <option value="">— Выбрать —</option>
                        <option>Ноутбуки</option>
                        <option>Периферия</option>
                        <option>Мониторы</option>
                        <option>Накопители</option>
                        <option>Аудио</option>
                        <option>Другое</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Ссылка на изображение</label>
                    <input x-model="form.imageUrl" placeholder="https://..."
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <button @click="showModal = false"
                        class="flex-1 py-2.5 border border-gray-300 text-gray-700 rounded-xl text-sm hover:bg-gray-50 transition">
                    Отмена
                </button>
                <button @click="saveProduct()"
                        class="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl text-sm transition">
                    <span x-text="editingProduct ? 'Сохранить' : 'Создать'"></span>
                </button>
            </div>
        </div>
    </div>

</div><!-- end x-data -->

<script>
    function sellerApp() {
        return {
            user: null,
            activeTab: 'products',

            products: [],
            loadingProducts: false,

            sales: [],
            expandedSale: null,
            loadingSales: false,

            sellerInfo: null,
            loadingBalance: false,

            showModal: false,
            editingProduct: null,
            form: { name: '', description: '', price: '', stockQuantity: '', imageUrl: '', category: '' },

            toasts: [],
            _toastId: 0,

            async init() {
                this.user = getCurrentUser();
                if (!this.user) return;
                await this.loadProducts();
            },

            async setTab(tab) {
                this.activeTab = tab;
                if (tab === 'products' && this.products.length === 0) await this.loadProducts();
                if (tab === 'sales')   await this.loadSales();
                if (tab === 'balance') await this.loadBalance();
            },

            // ── Товары ────────────────────────────────────────────
            async loadProducts() {
                this.loadingProducts = true;
                try { this.products = await api.getSellerProducts() || []; }
                catch (e) { this.toast(e.message, 'error'); }
                finally { this.loadingProducts = false; }
            },

            openModal(product = null) {
                this.editingProduct = product;
                this.form = product
                    ? { name: product.name, description: product.description || '', price: product.price, stockQuantity: product.stockQuantity, imageUrl: product.imageUrl || '', category: product.category || '' }
                    : { name: '', description: '', price: '', stockQuantity: '', imageUrl: '', category: '' };
                this.showModal = true;
            },

            async saveProduct() {
                if (!this.form.name.trim() || !this.form.price || this.form.stockQuantity === '') {
                    this.toast('Заполните обязательные поля', 'error');
                    return;
                }
                const data = {
                    name: this.form.name.trim(),
                    description: this.form.description.trim(),
                    price: parseFloat(this.form.price),
                    stockQuantity: parseInt(this.form.stockQuantity),
                    imageUrl: this.form.imageUrl.trim() || null,
                    category: this.form.category || null,
                };
                try {
                    if (this.editingProduct) {
                        await api.updateSellerProduct(this.editingProduct.id, data);
                        this.toast('Товар обновлён', 'success');
                    } else {
                        await api.createSellerProduct(data);
                        this.toast('Товар создан', 'success');
                    }
                    this.showModal = false;
                    await this.loadProducts();
                } catch (e) { this.toast(e.message, 'error'); }
            },

            async deleteProduct(product) {
                if (!confirm(`Удалить «${product.name}»?`)) return;
                try {
                    await api.deleteSellerProduct(product.id);
                    this.toast('Товар удалён', 'success');
                    await this.loadProducts();
                } catch (e) { this.toast(e.message, 'error'); }
            },

            // ── Продажи ───────────────────────────────────────────
            async loadSales() {
                this.loadingSales = true;
                try { this.sales = await api.getSellerSales() || []; }
                catch (e) { this.toast(e.message, 'error'); }
                finally { this.loadingSales = false; }
            },

            // ── Баланс ────────────────────────────────────────────
            async loadBalance() {
                this.loadingBalance = true;
                try { this.sellerInfo = await api.getSellerBalance(); }
                catch (e) { this.toast(e.message, 'error'); }
                finally { this.loadingBalance = false; }
            },

            // ── Утилиты ───────────────────────────────────────────
            fmt(val) {
                return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 }).format(val || 0);
            },

            fmtDate(dt) {
                if (!dt) return '';
                return new Date(dt).toLocaleString('ru-RU', { dateStyle: 'medium', timeStyle: 'short' });
            },

            statusLabel(s) {
                return { CREATED: 'Новый', PAID: 'Оплачен', CANCELLED: 'Отменён', DELIVERED: 'Доставлен' }[s] || s;
            },

            statusBadge(s) {
                return {
                    CREATED:   'bg-yellow-100 text-yellow-800',
                    PAID:      'bg-green-100 text-green-800',
                    CANCELLED: 'bg-red-100 text-red-700',
                    DELIVERED: 'bg-blue-100 text-blue-800',
                }[s] || 'bg-gray-100 text-gray-600';
            },

            productColor(id) {
                const palette = [
                    'linear-gradient(135deg,#10b981,#0d9488)',
                    'linear-gradient(135deg,#0ea5e9,#0d9488)',
                    'linear-gradient(135deg,#f59e0b,#10b981)',
                    'linear-gradient(135deg,#6366f1,#0ea5e9)',
                    'linear-gradient(135deg,#ec4899,#6366f1)',
                    'linear-gradient(135deg,#14b8a6,#0d9488)',
                ];
                return palette[(id - 1) % palette.length];
            },

            toast(message, type = 'info') {
                const id = ++this._toastId;
                this.toasts.push({ id, message, type });
                setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 3500);
            },
        };
    }
</script>
</body>
</html>
