<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace — Личный кабинет</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/auth.js"></script>
    <script>
        (function () {
            const u = requireAuth();
            if (!u) throw new Error('redirect');
        })();
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <script src="js/api.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div x-data="profileApp()" class="min-h-screen flex flex-col" x-cloak>

    <!-- ═══════════════════════════════ NAVBAR ════════════════════════════ -->
    <nav class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-40">
        <div class="max-w-2xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            <a :href="dashboardUrl"
               class="flex items-center gap-2 text-sm text-gray-600 hover:text-gray-900 transition px-3 py-1.5 rounded-lg hover:bg-gray-100">
                ← Назад
            </a>
            <div class="flex items-center gap-2">
                <span class="text-lg">👤</span>
                <span class="font-bold text-gray-900">Личный кабинет</span>
            </div>
            <button @click="logout()"
                    class="text-sm text-gray-500 hover:text-red-600 transition px-3 py-1.5 rounded-lg hover:bg-red-50">
                Выйти
            </button>
        </div>
    </nav>

    <!-- ════════════════════════════ TOAST ══════════════════════════════ -->
    <div class="fixed top-20 right-4 z-50 space-y-2">
        <template x-for="t in toasts" :key="t.id">
            <div x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-x-4"
                 x-transition:enter-end="opacity-100 translate-x-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100"
                 x-transition:leave-end="opacity-0"
                 :class="t.type === 'error'
                     ? 'bg-red-50 border-red-200 text-red-800'
                     : 'bg-green-50 border-green-200 text-green-800'"
                 class="flex items-center gap-2 px-4 py-3 rounded-xl border shadow-lg text-sm max-w-sm">
                <span x-text="t.type === 'error' ? '⚠️' : '✅'"></span>
                <span x-text="t.message"></span>
            </div>
        </template>
    </div>

    <!-- ═══════════════════════════ MAIN ════════════════════════════════ -->
    <main class="flex-1 max-w-2xl mx-auto w-full px-4 sm:px-6 py-8">

        <!-- Skeleton loading -->
        <div x-show="loading" class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 animate-pulse">
            <div class="flex items-center gap-4 mb-8 pb-8 border-b border-gray-100">
                <div class="w-16 h-16 rounded-2xl bg-gray-200"></div>
                <div class="space-y-2">
                    <div class="h-5 w-40 bg-gray-200 rounded"></div>
                    <div class="h-4 w-32 bg-gray-200 rounded"></div>
                </div>
            </div>
            <div class="space-y-4">
                <div class="h-10 bg-gray-200 rounded-xl"></div>
                <div class="h-10 bg-gray-200 rounded-xl"></div>
                <div class="h-10 bg-gray-200 rounded-xl"></div>
            </div>
        </div>

        <!-- Profile card -->
        <div x-show="!loading && profile" class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">

            <!-- Шапка профиля -->
            <div class="bg-gradient-to-r from-indigo-500 to-violet-600 px-6 pt-8 pb-16 relative">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 rounded-2xl bg-white/20 flex items-center justify-center text-2xl font-extrabold text-white shadow-inner">
                        <span x-text="(profile?.fullName || profile?.email || '?')[0].toUpperCase()"></span>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-white"
                            x-text="profile?.fullName || 'Пользователь'"></h2>
                        <p class="text-white/70 text-sm" x-text="profile?.email"></p>
                    </div>
                </div>
                <span class="absolute bottom-4 right-6 text-xs font-semibold px-3 py-1 rounded-full"
                      :class="roleBadgeClass"
                      x-text="roleLabel"></span>
            </div>

            <!-- Форма редактирования -->
            <div class="px-6 pb-6 -mt-4">
                <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 space-y-5">

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">ФИО</label>
                        <input x-model="form.fullName"
                               placeholder="Иван Иванович Иванов"
                               class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
                        <input :value="profile?.email" disabled
                               class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-gray-50 text-gray-400 cursor-not-allowed">
                        <p class="text-xs text-gray-400 mt-1">Email изменить нельзя</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Адрес доставки</label>
                        <input x-model="form.address"
                               placeholder="Москва, ул. Примерная, д. 1, кв. 12"
                               class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
                        <p class="text-xs text-gray-400 mt-1">Автоматически подставляется при оформлении заказа</p>
                    </div>

                    <!-- Только для продавца -->
                    <div x-show="profile?.role === 'SELLER'" x-transition>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Название магазина</label>
                        <input x-model="form.shopName"
                               placeholder="TechShop"
                               class="w-full px-3 py-2.5 border border-emerald-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 transition">
                    </div>

                    <!-- Баланс продавца (read-only) -->
                    <div x-show="profile?.role === 'SELLER'" x-transition
                         class="flex items-center justify-between bg-emerald-50 rounded-xl px-4 py-3 border border-emerald-100">
                        <span class="text-sm text-emerald-700 font-medium">Баланс магазина</span>
                        <span class="text-lg font-bold text-emerald-700"
                              x-text="fmt(profile?.balance || 0)"></span>
                    </div>

                    <button @click="saveProfile()"
                            :disabled="saving"
                            class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-300 text-white font-semibold rounded-xl text-sm transition">
                        <span x-text="saving ? 'Сохранение...' : 'Сохранить изменения'"></span>
                    </button>
                </div>
            </div>
        </div>
    </main>

</div><!-- end x-data -->

<script>
    function profileApp() {
        return {
            user: null,
            profile: null,
            form: { fullName: '', address: '', shopName: '' },
            saving: false,
            loading: true,
            toasts: [],
            _toastId: 0,

            async init() {
                this.user = getCurrentUser();
                if (!this.user) return;
                await this.loadProfile();
            },

            async loadProfile() {
                this.loading = true;
                try {
                    this.profile = await api.getProfile();
                    this.form = {
                        fullName: this.profile.fullName || '',
                        address:  this.profile.address  || '',
                        shopName: this.profile.shopName || '',
                    };
                } catch (e) {
                    this.toast(e.message, 'error');
                } finally {
                    this.loading = false;
                }
            },

            async saveProfile() {
                this.saving = true;
                try {
                    const data = {
                        fullName: this.form.fullName.trim() || null,
                        address:  this.form.address.trim()  || null,
                    };
                    if (this.profile?.role === 'SELLER') {
                        data.shopName = this.form.shopName.trim() || null;
                    }
                    this.profile = await api.updateProfile(data);

                    // Update localStorage name/shopName so navbar reflects changes immediately
                    const stored = getCurrentUser();
                    if (stored) {
                        stored.name     = this.profile.fullName || stored.email;
                        stored.shopName = this.profile.shopName;
                        localStorage.setItem('marketplace_user', JSON.stringify(stored));
                    }

                    this.toast('Профиль сохранён', 'success');
                } catch (e) {
                    this.toast(e.message, 'error');
                } finally {
                    this.saving = false;
                }
            },

            get dashboardUrl() {
                const role = this.user?.role;
                if (role === 'ADMIN')  return 'admin.html';
                if (role === 'SELLER') return 'seller.html';
                return 'client.html';
            },

            get roleLabel() {
                return { CLIENT: 'Покупатель', SELLER: 'Продавец', ADMIN: 'Администратор' }[this.profile?.role] || '';
            },

            get roleBadgeClass() {
                return {
                    CLIENT: 'bg-indigo-100 text-indigo-700',
                    SELLER: 'bg-emerald-100 text-emerald-700',
                    ADMIN:  'bg-red-100 text-red-700',
                }[this.profile?.role] || 'bg-gray-100 text-gray-600';
            },

            fmt(val) {
                return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 }).format(val || 0);
            },

            logout() { logout(); },

            toast(message, type = 'info') {
                const id = ++this._toastId;
                this.toasts.push({ id, message, type });
                setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 3500);
            },
        };
    }
</script>
</body>
</html>
