spring.application.name=marketplace-demo

spring.datasource.url=jdbc:postgresql://localhost:5432/marketplace
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.sql.init.mode=never

server.port=8667
logging.level.com.example.marketplace=DEBUG

# JWT
jwt.secret=dGhpcy1pcy1hLXNlY3VyZS1qd3Qtc2VjcmV0LWtleS1mb3ItbWFya2V0cGxhY2U=
# access-токен: 15 минут
jwt.expiration=900000
# refresh-токен: 7 дней
jwt.refresh-expiration=604800000

# Actuator / Prometheus — метрики приложения.
# Открыть: http://localhost:8667/actuator/prometheus
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=never

# Настройки загрузки файлов (multipart/form-data).
# max-file-size  — максимальный размер одного файла.
# max-request-size — максимальный размер всего запроса (файл + метаданные).
# Значение 3MB для запроса: 2MB файл + ~1MB на заголовки и другие поля формы.
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=3MB

# Yandex SMTP — отправка чеков покупателям и писем от администратора.
# Пароль подставляется из переменной окружения MAIL_PASSWORD (не хранится в коде).
spring.mail.host=smtp.yandex.ru
spring.mail.port=465
spring.mail.username=vorobyshek2015@yandex.ru
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=smtps
spring.mail.properties.mail.smtps.auth=true
spring.mail.properties.mail.smtps.ssl.enable=true
spring.mail.properties.mail.smtps.ssl.trust=*
spring.mail.properties.mail.debug=false

# OpenSearch — полнотекстовый поиск по товарам.
# В Docker/K8s хост переопределяется через OPENSEARCH_HOST (env var → opensearch.host).
opensearch.host=localhost
opensearch.port=9200
opensearch.scheme=http

# Alfa Bank Payment Gateway (тестовая среда).
# Пароль подставляется из переменной окружения ALFABANK_PASSWORD.
# returnUrl и failUrl — browser-redirect от банка, должны быть доступны из браузера клиента.
alfabank.gateway-url=https://alfa.rbsuat.com/payment/rest/
alfabank.user-name=${ALFABANK_USERNAME:}
alfabank.password=${ALFABANK_PASSWORD:}
alfabank.return-url=${ALFABANK_RETURN_URL:http://localhost:8667/api/payment/callback}
alfabank.fail-url=${ALFABANK_FAIL_URL:http://localhost:8667/api/payment/fail}
alfabank.card-bind-return-url=${ALFABANK_CARD_BIND_RETURN_URL:http://localhost:8667/api/payment/card-bind-callback}
