# ════════════════════════════════════════════════════════════════════════════
# 01-secrets.yaml — Пароли и чувствительные данные
# ════════════════════════════════════════════════════════════════════════════
#
# ЧТО ТАКОЕ SECRET?
# Secret — специальный K8s-объект для хранения чувствительных данных:
# паролей, токенов, ключей API, TLS-сертификатов.
#
# ЧЕМ SECRET ОТЛИЧАЕТСЯ ОТ CONFIGMAP?
# ConfigMap — открытые конфигурационные переменные (URL, имена, флаги).
# Secret — зашифрованные данные. Отличия:
#   - Secret не попадает в логи `kubectl describe pod` (скрывается как ***)
#   - Secret можно ограничить доступом через RBAC (кто может читать пароли)
#   - В production Secret хранится в etcd с шифрованием at-rest
#   - В Helm: Secret задаётся через --set postgres.password=xxx (не в git)
#
# ЧТО ТАКОЕ stringData vs data?
# data:       — значения уже закодированы в base64 вручную
#               postgres-password: MTIzNA==  (base64 от "1234")
# stringData: — значения в открытом виде, K8s сам кодирует в base64 при сохранении.
#               Удобнее для редактирования, нет риска ошибиться с кодировкой.
#               В etcd всё равно хранится как base64.
#
# КАК СЕКРЕТЫ ИСПОЛЬЗУЮТСЯ В ПОДАХ?
# Способ 1 — как переменная окружения (см. 06-app.yaml):
#   env:
#     - name: SPRING_DATASOURCE_PASSWORD
#       valueFrom:
#         secretKeyRef:
#           name: marketplace-secrets
#           key: postgres-password
#
# Способ 2 — как файл (монтируется в /etc/secrets/postgres-password)
# Способ 3 — envFrom: secretRef (весь Secret как переменные окружения)
#
# ⚠️  ВНИМАНИЕ: этот файл с паролем "1234" можно коммитить — это учебный проект.
#    В production пароль задаётся при деплое: helm install ... --set postgres.password=REAL
#    Или через внешние хранилища: HashiCorp Vault, AWS Secrets Manager, Azure Key Vault.
# ════════════════════════════════════════════════════════════════════════════

apiVersion: v1               # Стабильная группа API (v1) для Secret, ConfigMap, Service.
kind: Secret                 # Тип ресурса — хранилище чувствительных данных.
metadata:
  name: marketplace-secrets  # Имя секрета. По этому имени ссылаемся в Deployment-ах.
  namespace: marketplace     # Секрет принадлежит namespace marketplace.
                             # Под из другого namespace не сможет читать этот секрет.
type: Opaque                 # Тип секрета.
                             # Opaque = произвольные данные (наш случай: пароли).
                             # Другие типы: kubernetes.io/tls (сертификаты),
                             #   kubernetes.io/dockerconfigjson (доступ к registry),
                             #   kubernetes.io/service-account-token.
stringData:                  # Ключи и значения в открытом виде (не base64).
                             # K8s автоматически кодирует их в base64 при сохранении.

  postgres-password: "1234"  # Пароль для PostgreSQL.
                             # Это значение подставляется в POSTGRES_PASSWORD (контейнер postgres)
                             # и в SPRING_DATASOURCE_PASSWORD (контейнер приложения).
                             # Оба контейнера используют один и тот же секрет — согласованность гарантирована.

  mail-password: ""          # Пароль приложения Яндекс-почты для SMTP.
                             # Оставь пустым для локального тестирования — email не отправится,
                             # но приложение запустится (mail health indicator отключён в ConfigMap).
                             # Для реальной отправки: замени на пароль из Яндекс ID → Безопасность.
