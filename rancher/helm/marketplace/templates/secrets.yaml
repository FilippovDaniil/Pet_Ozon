apiVersion: v1
kind: Secret
metadata:
  name: marketplace-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  # Значения берутся из values.yaml или переопределяются при helm install.
  # Пример: helm install marketplace ./helm/marketplace --set postgres.password=mypass
  postgres-password: {{ .Values.postgres.password | quote }}
  mail-password: {{ .Values.mail.password | quote }}
