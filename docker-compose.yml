# docker-compose.yml — запускает всё приложение одной командой: docker compose up
#
# Сервисы:
#   postgres — база данных PostgreSQL 15 (как в продакшне).
#   app      — Spring Boot приложение, собранное из Dockerfile.
#
# Запуск:   docker compose up --build
# Остановка: docker compose down
# С очисткой данных: docker compose down -v

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine         # Alpine — минимальный образ (~80 МБ)
    container_name: marketplace_db
    environment:
      POSTGRES_DB: marketplace        # имя базы данных
      POSTGRES_USER: postgres         # пользователь (совпадает с application.properties)
      POSTGRES_PASSWORD: "1234"       # пароль
    ports:
      - "5432:5432"                   # пробрасываем порт для подключения из IDE / DBeaver
    volumes:
      - postgres_data:/var/lib/postgresql/data  # данные сохраняются между перезапусками
    healthcheck:
      # pg_isready — утилита PostgreSQL: возвращает 0 когда сервер готов принимать соединения.
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketplace"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── OpenSearch — полнотекстовый поиск ──────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.17.0
    container_name: marketplace_opensearch
    environment:
      - discovery.type=single-node        # один узел — режим разработки
      - DISABLE_SECURITY_PLUGIN=true      # без SSL и Basic Auth (только для dev)
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"  # лимит JVM-heap
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"   # REST API (curl http://localhost:9200)
      - "9600:9600"   # Performance Analyzer
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      # Ждём пока кластер выйдет в статус green или yellow
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 20

  # ── Spring Boot App ─────────────────────────────────────────────────────────
  app:
    build: .                          # собрать образ из Dockerfile в текущей директории
    container_name: marketplace_app
    ports:
      - "8667:8667"                   # приложение доступно на localhost:8667 (server.port=8667)
    environment:
      # Переопределяем настройки из application.properties для работы в Docker-сети.
      # В Docker-сети хост БД — имя сервиса "postgres", не "localhost".
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/marketplace
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "1234"
      # Таблицы создаются/обновляются автоматически при старте приложения.
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # Профиль "docker" активирует Loki-аппендер в logback-spring.xml
      SPRING_PROFILES_ACTIVE: docker
      MAIL_PASSWORD: "${MAIL_PASSWORD}"
      # OpenSearch: Spring Boot автоматически маппит OPENSEARCH_HOST → opensearch.host
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: "9200"
      OPENSEARCH_SCHEME: http
    depends_on:
      postgres:
        condition: service_healthy    # ждём пока PostgreSQL полностью запустится
      loki:
        condition: service_healthy    # ждём пока Loki готов принимать логи
      opensearch:
        condition: service_healthy    # ждём пока OpenSearch принимает запросы

  # ── Grafana Loki — агрегатор логов ──────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.10
    container_name: marketplace_loki
    # Loki 2.x запускается как non-root (UID 10001) — именованный том создаётся
    # с root-правами и Loki не может писать в него. user: "0" = запуск от root.
    user: "0"
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Prometheus — сбор метрик из Spring Boot Actuator ──────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: marketplace_prometheus
    ports:
      - "9090:9090"                   # UI: http://localhost:9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      app:
        condition: service_started

  # ── Grafana — визуализация логов ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.3
    container_name: marketplace_grafana
    ports:
      - "3000:3000"                   # UI: http://localhost:3000 (admin / admin)
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
      - prometheus

# Именованный том: данные PostgreSQL хранятся вне контейнера.
# docker compose down НЕ удаляет том. docker compose down -v — удаляет.
volumes:
  postgres_data:
  loki_data:
  grafana_data:
  prometheus_data:
  opensearch_data:
